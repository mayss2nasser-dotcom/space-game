
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
#game { font-family: var(--font-sans); background: #060b1e; border-radius: 16px; overflow: hidden; position: relative; min-height: 580px; }
#starfield { position: absolute; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
.star-dot { position: absolute; border-radius: 50%; background: #fff; }
.nebula { position: absolute; border-radius: 50%; opacity: 0.06; }
#game-inner { position: relative; z-index: 2; padding: 16px 18px 24px; }
#space-canvas { width: 100%; height: 150px; border-radius: 12px; background: #07102a; border: 1px solid #1b2560; position: relative; overflow: hidden; margin-bottom: 12px; }
.sc-star { position: absolute; background: #fff; border-radius: 50%; }
#rocket-wrap { position: absolute; bottom: 20px; transition: left 0.7s cubic-bezier(.4,0,.2,1); font-size: 34px; line-height: 1; }
#planet-wrap { position: absolute; right: 18px; bottom: 12px; font-size: 50px; line-height: 1; }
#track-line { position: absolute; bottom: 33px; left: 76px; right: 86px; height: 2px; background: #1b2560; border-radius: 1px; }
#track-fill { height: 2px; background: #5DCAA5; border-radius: 1px; width: 0%; transition: width 0.7s ease; }
#hud-left { position: absolute; top: 9px; left: 12px; font-size: 11px; color: #85B7EB; }
#hud-right { position: absolute; top: 9px; right: 12px; font-size: 11px; color: #FAC775; }
.stats-row { display: flex; gap: 8px; margin-bottom: 12px; }
.stat-box { flex: 1; background: #0c1430; border: 1px solid #1b2560; border-radius: 10px; padding: 9px 6px; text-align: center; }
.stat-label { font-size: 11px; color: #85B7EB; margin-bottom: 3px; }
.stat-val { font-size: 22px; font-weight: 500; color: #E6F1FB; }
.stat-val.green { color: #5DCAA5; }
.stat-val.red { color: #F09595; }
#question-box { background: #0a1128; border: 1px solid #253080; border-radius: 14px; padding: 20px 18px 16px; text-align: center; margin-bottom: 10px; }
#question-label { font-size: 12px; color: #7F77DD; letter-spacing: 0.08em; margin-bottom: 10px; }
#question-text { font-size: 34px; font-weight: 500; color: #E6F1FB; margin-bottom: 18px; direction: ltr; letter-spacing: 0.02em; }
#answer-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
#answer-input { width: 155px; height: 54px; background: #0f1a3a; border: 2px solid #3a4a9a; border-radius: 10px; color: #E6F1FB; font-size: 28px; font-weight: 500; text-align: center; outline: none; transition: border-color 0.2s, background 0.2s; font-family: var(--font-sans); direction: ltr; cursor: text; }
#answer-input:focus { border-color: #7F77DD; background: #141e45; }
#answer-input.shake { animation: shake 0.42s ease; border-color: #E24B4A; background: #1a0a0a; }
#answer-input.correct-flash { border-color: #5DCAA5; background: #041a10; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-9px)} 40%{transform:translateX(9px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
.abtn { height: 54px; padding: 0 20px; border-radius: 10px; font-size: 16px; font-weight: 500; cursor: pointer; font-family: var(--font-sans); transition: background 0.15s, transform 0.1s, border-color 0.15s; outline: none; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
.abtn:active { transform: scale(0.96); }
.abtn-confirm { background: #1e1560; border: 2px solid #7F77DD; color: #C8C4F8; }
.abtn-confirm:hover { background: #2a1e88; border-color: #AFA9EC; color: #E6F1FB; }
.abtn-start { background: #1a1060; border: 2px solid #7F77DD; color: #C8C4F8; padding: 13px 44px; font-size: 18px; height: auto; border-radius: 12px; }
.abtn-start:hover { background: #2a1e88; border-color: #AFA9EC; color: #E6F1FB; }
.abtn-primary { background: #1e1560; border: 2px solid #7F77DD; color: #C8C4F8; padding: 12px 28px; height: auto; font-size: 15px; }
.abtn-primary:hover { background: #2a1e88; border-color: #AFA9EC; color: #E6F1FB; }
.abtn-ghost { background: #0c1430; border: 2px solid #3a4a9a; color: #85B7EB; padding: 12px 22px; height: auto; font-size: 15px; }
.abtn-ghost:hover { background: #111e48; border-color: #5DCAA5; color: #E6F1FB; }
.lvl-btn { padding: 10px 16px; border: 2px solid #253080; border-radius: 10px; background: #0c1430; cursor: pointer; font-size: 13px; color: #6b7ab8; transition: all 0.15s; font-family: var(--font-sans); font-weight: 500; }
.lvl-btn:hover { border-color: #534AB7; color: #AFA9EC; background: #141e48; }
.lvl-btn.active { background: #1e1560; border-color: #7F77DD; color: #C8C4F8; }
#feedback { min-height: 26px; text-align: center; font-size: 15px; color: #AFA9EC; direction: rtl; margin-top: 8px; }
#feedback.ok { color: #5DCAA5; }
#feedback.err { color: #F09595; }
#hint-text { font-size: 12px; color: #7F77DD; min-height: 18px; text-align: center; margin-top: 5px; direction: rtl; }
#screen-start { padding: 2rem 1.5rem; text-align: center; }
#screen-start h2 { font-size: 26px; font-weight: 500; color: #E6F1FB; margin-bottom: 10px; }
#screen-start p { font-size: 14px; color: #85B7EB; margin-bottom: 1.4rem; line-height: 1.7; }
.level-select { display: flex; gap: 8px; justify-content: center; margin-bottom: 1.4rem; flex-wrap: wrap; }
#screen-end { padding: 2rem 1.5rem; text-align: center; display: none; }
#screen-end h2 { font-size: 24px; font-weight: 500; color: #E6F1FB; margin-bottom: 8px; direction: rtl; }
#screen-end p { font-size: 14px; color: #85B7EB; margin-bottom: 1rem; direction: rtl; }
.end-stats { display: flex; gap: 10px; max-width: 300px; margin: 0 auto 1.2rem; }
.end-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 1rem; }
#code-box { background: #0a1128; border: 2px solid #5DCAA5; border-radius: 14px; padding: 16px 20px; max-width: 320px; margin: 0 auto 1rem; direction: rtl; }
#code-box p { font-size: 14px; color: #9FE1CB; margin-bottom: 8px; line-height: 1.6; }
#code-number { font-size: 38px; font-weight: 500; color: #5DCAA5; letter-spacing: 0.18em; display: block; margin-top: 4px; }
</style>

<div id="game">
  <div id="starfield"></div>
  <div id="game-inner">

    <div id="screen-start">
      <div style="font-size:54px;margin-bottom:12px;">🚀</div>
      <h2>مغامرة الفضاء</h2>
      <p>أجب على مسائل الأعداد العشرية<br>لتحريك صاروخك نحو الكوكب!</p>
      <div class="level-select">
        <button class="lvl-btn active" onclick="setLevel(1)">المستوى 1 — سهل</button>
        <button class="lvl-btn" onclick="setLevel(2)">المستوى 2 — متوسط</button>
        <button class="lvl-btn" onclick="setLevel(3)">المستوى 3 — صعب</button>
      </div>
      <button class="abtn abtn-start" onclick="startGame()">ابدأ الرحلة &#8594;</button>
    </div>

    <div id="screen-game" style="display:none;">
      <div id="space-canvas">
        <div id="hud-left">المستوى <span id="lv-disp">1</span></div>
        <div id="hud-right">السؤال <span id="q-num">1</span> / 10</div>
        <div id="track-line"><div id="track-fill"></div></div>
        <div id="rocket-wrap">🚀</div>
        <div id="planet-wrap">🪐</div>
      </div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-label">النقاط</div><div class="stat-val" id="score-disp">0</div></div>
        <div class="stat-box"><div class="stat-label">صحيحة</div><div class="stat-val green" id="correct-disp">0</div></div>
        <div class="stat-box"><div class="stat-label">محاولات خاطئة</div><div class="stat-val red" id="wrong-disp">0</div></div>
      </div>
      <div id="question-box">
        <div id="question-label">حل المعادلة</div>
        <div id="question-text">...</div>
        <div id="answer-row">
          <input type="number" id="answer-input" placeholder="؟" step="any" autocomplete="off" />
          <button class="abtn abtn-confirm" onclick="checkAnswer()">
            <i class="ti ti-check" aria-hidden="true" style="font-size:18px;"></i> تأكيد
          </button>
        </div>
        <div id="hint-text"></div>
      </div>
      <div id="feedback"></div>
    </div>

    <div id="screen-end">
      <div style="font-size:54px;margin-bottom:12px;" id="end-icon">🏆</div>
      <h2 id="end-title">وصلت إلى الكوكب!</h2>
      <p id="end-msg">عمل رائع يا رائد الفضاء!</p>
      <div class="end-stats">
        <div class="stat-box"><div class="stat-label">النقاط النهائية</div><div class="stat-val" id="final-score">0</div></div>
        <div class="stat-box"><div class="stat-label">الدقة</div><div class="stat-val green" id="final-acc">0%</div></div>
      </div>

      <div id="code-box">
        <p>للعبور إلى المحطة التالية، الكود هو:</p>
        <span id="code-number">2702</span>
      </div>

      <div class="end-btns">
        <button class="abtn abtn-primary" onclick="resetGame()">
          <i class="ti ti-refresh" aria-hidden="true" style="font-size:16px;"></i> العب مرة أخرى
        </button>
      </div>
    </div>

  </div>
</div>

<script>
let level = 1, score = 0, correctCount = 0, wrongAttempts = 0;
let qIndex = 0, totalQ = 10;
let currentAnswer = 0, currentDec = 1, attemptsOnQ = 0;
let questions = [];
const planets = ['🪐','🌍','🌙','⭐','🌠'];

function buildStarfield() {
  const sf = document.getElementById('starfield');
  sf.innerHTML = '';
  for (let i = 0; i < 70; i++) {
    const s = document.createElement('div');
    s.className = 'star-dot';
    const sz = Math.random() * 2.2 + 0.4;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;opacity:${0.25+Math.random()*0.65}`;
    sf.appendChild(s);
  }
  const cols = ['#7F77DD','#378ADD','#5DCAA5'];
  for (let i = 0; i < 3; i++) {
    const n = document.createElement('div');
    n.className = 'nebula';
    const sz = 100 + Math.random() * 150;
    n.style.cssText = `width:${sz}px;height:${sz}px;top:${10+Math.random()*70}%;left:${5+Math.random()*75}%;background:${cols[i]};filter:blur(45px)`;
    sf.appendChild(n);
  }
}

function buildCanvasStars() {
  const c = document.getElementById('space-canvas');
  c.querySelectorAll('.sc-star').forEach(s => s.remove());
  for (let i = 0; i < 30; i++) {
    const s = document.createElement('div');
    s.className = 'sc-star';
    const sz = Math.random() * 2 + 0.5;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*80}%;left:${Math.random()*90}%;opacity:${0.3+Math.random()*0.6}`;
    c.appendChild(s);
  }
}

function setLevel(l) {
  level = l;
  document.querySelectorAll('.lvl-btn').forEach((b, i) => b.classList.toggle('active', i === l - 1));
}

function safeCalc(a, b, op, dec) {
  const f = Math.pow(10, dec);
  const ia = Math.round(a * f);
  const ib = Math.round(b * f);
  const res = op === '+' ? ia + ib : ia - ib;
  return res / f;
}

function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function genQ() {
  let a, b, op, ans, display, dec;
  if (level === 1) {
    dec = 1;
    a = Math.round((randInt(1,9) + randInt(1,9)/10) * 10) / 10;
    b = Math.round((randInt(1,9) + randInt(1,9)/10) * 10) / 10;
    op = Math.random() < 0.5 ? '+' : '-';
    if (op === '-' && b > a) { let t=a; a=b; b=t; }
    ans = safeCalc(a, b, op, 1);
    display = a.toFixed(1) + '  ' + op + '  ' + b.toFixed(1) + '  =  ?';
  } else if (level === 2) {
    dec = 1;
    a = Math.round((randInt(10,79) + randInt(0,9)/10) * 10) / 10;
    b = Math.round((randInt(5,39) + randInt(0,9)/10) * 10) / 10;
    op = Math.random() < 0.5 ? '+' : '-';
    if (op === '-' && b > a) { let t=a; a=b; b=t; }
    ans = safeCalc(a, b, op, 1);
    display = a.toFixed(1) + '  ' + op + '  ' + b.toFixed(1) + '  =  ?';
  } else {
    dec = 2;
    a = Math.round((randInt(10,79) + randInt(0,9)/10 + randInt(0,9)/100) * 100) / 100;
    b = Math.round((randInt(5,39) + randInt(0,9)/10 + randInt(0,9)/100) * 100) / 100;
    op = Math.random() < 0.5 ? '+' : '-';
    if (op === '-' && b > a) { let t=a; a=b; b=t; }
    ans = safeCalc(a, b, op, 2);
    display = a.toFixed(2) + '  ' + op + '  ' + b.toFixed(2) + '  =  ?';
  }
  return { text: display, answer: ans, dec: dec };
}

function generateQuestions() {
  questions = [];
  for (let i = 0; i < totalQ; i++) questions.push(genQ());
}

function startGame() {
  generateQuestions();
  score = 0; correctCount = 0; wrongAttempts = 0; qIndex = 0;
  document.getElementById('screen-start').style.display = 'none';
  document.getElementById('screen-end').style.display = 'none';
  document.getElementById('screen-game').style.display = 'block';
  document.getElementById('planet-wrap').textContent = planets[Math.floor(Math.random()*planets.length)];
  document.getElementById('lv-disp').textContent = level;
  buildCanvasStars();
  updateStats();
  renderQuestion();
}

function updateStats() {
  document.getElementById('score-disp').textContent = score;
  document.getElementById('correct-disp').textContent = correctCount;
  document.getElementById('wrong-disp').textContent = wrongAttempts;
  document.getElementById('q-num').textContent = Math.min(qIndex+1, totalQ);
  const pct = (qIndex / totalQ) * 100;
  document.getElementById('track-fill').style.width = pct + '%';
  document.getElementById('rocket-wrap').style.left = (3 + pct*0.54) + '%';
}

function renderQuestion() {
  if (qIndex >= totalQ) { endGame(); return; }
  attemptsOnQ = 0;
  const q = questions[qIndex];
  currentAnswer = q.answer;
  currentDec = q.dec;
  document.getElementById('question-text').textContent = q.text;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = '';
  document.getElementById('hint-text').textContent = '';
  const inp = document.getElementById('answer-input');
  inp.value = ''; inp.className = '';
  inp.removeAttribute('disabled');
  setTimeout(() => inp.focus(), 80);
}

function checkAnswer() {
  const inp = document.getElementById('answer-input');
  const raw = inp.value.trim();
  if (raw === '' || isNaN(parseFloat(raw))) { setFeedback('اكتب إجابتك في المستطيل', 'err'); return; }
  const userVal = parseFloat(raw);
  const f = Math.pow(10, currentDec);
  const isCorrect = Math.round(userVal * f) === Math.round(currentAnswer * f);
  if (isCorrect) {
    inp.className = 'correct-flash';
    const pts = Math.max(10, 20 - attemptsOnQ*3);
    score += pts; correctCount++;
    document.getElementById('score-disp').textContent = score;
    document.getElementById('correct-disp').textContent = correctCount;
    setFeedback('ممتاز! إجابة صحيحة  +' + pts, 'ok');
    inp.setAttribute('disabled', true);
    setTimeout(() => { qIndex++; updateStats(); renderQuestion(); }, 1300);
  } else {
    attemptsOnQ++; wrongAttempts++;
    document.getElementById('wrong-disp').textContent = wrongAttempts;
    setFeedback('إجابة خاطئة — حاول مرة أخرى!', 'err');
    inp.className = 'shake'; inp.value = '';
    setTimeout(() => { inp.className = ''; inp.focus(); }, 440);
    if (attemptsOnQ === 2) document.getElementById('hint-text').textContent = 'تلميح: انتبه لمحل الفاصلة العشرية';
    else if (attemptsOnQ === 4) {
      const lo = (currentAnswer-1).toFixed(currentDec);
      const hi = (currentAnswer+1).toFixed(currentDec);
      document.getElementById('hint-text').textContent = 'تلميح: الإجابة تقع بين ' + lo + ' و ' + hi;
    }
  }
}

function setFeedback(msg, cls) {
  const f = document.getElementById('feedback');
  f.textContent = msg; f.className = cls;
}

function endGame() {
  document.getElementById('screen-game').style.display = 'none';
  document.getElementById('screen-end').style.display = 'block';
  const acc = Math.round((correctCount/totalQ)*100);
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-acc').textContent = acc + '%';
  if (acc >= 80) {
    document.getElementById('end-icon').textContent = '🏆';
    document.getElementById('end-title').textContent = 'وصلت إلى الكوكب!';
    document.getElementById('end-msg').textContent = 'عمل رائع يا رائد الفضاء! أنت بطل الأعداد العشرية!';
  } else if (acc >= 50) {
    document.getElementById('end-icon').textContent = '🚀';
    document.getElementById('end-title').textContent = 'رحلة جيدة!';
    document.getElementById('end-msg').textContent = 'تقدمت كثيرًا، تدرب أكثر لتصل إلى الكوكب!';
  } else {
    document.getElementById('end-icon').textContent = '💫';
    document.getElementById('end-title').textContent = 'استمر في التدريب!';
    document.getElementById('end-msg').textContent = 'لا تستسلم! كل رحلة فضائية تبدأ بالتدرب جيدًا.';
  }
}

function resetGame() {
  document.getElementById('screen-end').style.display = 'none';
  document.getElementById('screen-start').style.display = 'block';
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('screen-game').style.display !== 'none') checkAnswer();
});

buildStarfield();
</script>
